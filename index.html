                    <h1 class="text-3xl font-bold mb-4">A Deep Dive into Modern CSS</h1>

                        <h2 class="text-2xl font-semibold mt-6 mb-3">1. Flexbox</h2>
                        <p>Flexbox is a one-dimensional layout method for arranging items in rows or columns. It makes it easy to align items and distribute space. Perfect for navigation bars and component-level layouts.</p>

        // --- GEMINI API INTEGRATION ---
        async function callGemini(prompt) {
            const apiKey = ""; // Leave empty, will be handled by the environment
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            
            let chatHistory = [{ role: "user", parts: [{ text: prompt }] }];
            const payload = { contents: chatHistory };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API call failed with status: ${response.status}`);
                }

                const result = await response.json();
                
                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    return result.candidates[0].content.parts[0].text;
                } else {
                    console.error("Unexpected API response structure:", result);
                    return "Sorry, I couldn't get a response. Please try again.";
                }
            } catch (error) {
                console.error("Error calling Gemini API:", error);
                return "An error occurred while contacting the AI. Check the console for details.";
            }
        }

                <div class="flex flex-wrap items-center justify-between border-b pb-4 mb-6 gap-4">
                     <a href="#" id="home-logo-link">
                        <svg class="w-24 h-auto" viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M134.401 51.531c0-16.311-1.33-32.003-3.722-47.211H88.599v91.361h45.802c-.225-1.137-.403-2.293-.532-3.468-.148-1.33-.225-2.679-.225-4.045.018-1.78.148-3.542.37-5.285.225-1.744.532-3.468.905-5.157.37-1.695.83-3.354 1.366-4.977.532-1.623 1.157-3.21 1.858-4.743.701-1.533 1.49-2.99 2.354-4.37.864-1.38 1.81-2.679 2.825-3.886 1.015-1.207 2.098-2.322 3.23-3.336 1.132-1.015 2.31-1.922 3.52-2.712 1.207-.79 2.45-1.467 3.722-2.018 1.272-.551 2.57-0.98 3.886-1.287 1.316-.307 2.645-.463 3.974-.463 1.33 0 2.66.156 3.974.463 1.316.307 2.614.736 3.886 1.287s2.515 1.228 3.722 2.018c1.207.79 2.378 1.707 3.52 2.712 1.132-1.015 2.215 2.129 3.23 3.336 1.015 1.207 1.96 2.506 2.825 3.886.864 1.38 1.653 2.837 2.354 4.37.701 1.533 1.326 3.12 1.858 4.743.532 1.695.997 3.372 1.366 4.977.37 1.78.68 3.542.905 5.285.225 1.744.352 3.506.37 5.285 0 1.366-.077 2.712-.225 4.045-.129 1.175-.307 2.331-.532 3.468H272v-8.974h-24.59c-7.936 13.883-22.31 22.923-39.01 22.923-16.7 0-31.074-9.04-39.01-22.923H134.401v8.974z"/><path fill="#EA4335" d="M88.599 4.32h42.08c-5.339-2.825-11.21-4.32-17.48-4.32-14.803 0-28.104 7.03-36.56 18.291l11.962 14.803C88.6 22.189 88.599 13.266 88.599 4.32z"/><path fill="#FBBC05" d="M36.56 18.291C28.104 7.03 14.803 0 0 0 6.27 0 12.14 1.495 17.48 4.32h-42.08c5.339-2.825-11.21-4.32-17.48-4.32-14.803 0-28.104 7.03-36.56 18.291l-11.962 14.803c0-10.905 0-19.828 0-28.751h42.08c-5.339-2.825-11.21-4.32-17.48-4.32-14.803 0-28.104 7.03-36.56 18.291l-11.962 14.803c0-10.905 0-19.828 0-28.751h42.08c-5.339-2.825-11.21-4.32-17.48-4.32-14.803 0-28.104 7.03-36.56 18.291l-11.962 14.803c0-10.905 0-19.828 0-28.751h42.08c-5.339-2.825-11.21-4.32-17.48-4.32-14.803 0-28.104 7.03-36.56 18.291l-11.962 14.803c0-10.905 0-19.828 0-28.751H0v91.361h45.802V4.32H0v91.361h45.802V4.32z"/><path fill="#34A853" d="M226.198 4.32c5.339-2.825 11.21-4.32 17.48-4.32 14.803 0 28.104 7.03 36.56 18.291l11.962-14.803c-8.456-11.261-21.757-18.291-36.56-18.291-6.27 0-12.14 1.495-17.48 4.32H272v91.361h-45.802V4.32z"/></svg>
                     </a>
                    <form id="results-search-form" class="flex-grow max-w-xl">
                        <input id="results-search-input" type="text" class="block w-full bg-white border border-gray-300 rounded-full py-3 pl-5 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm" value="${query}">
                    </form>
                    ${query ? `<button id="suggest-topics-button" class="bg-green-100 hover:bg-green-200 text-green-800 font-bold py-2 px-4 rounded-lg flex items-center whitespace-nowrap">✨ Suggest Related Topics</button>` : ''}
                </div>
                <div id="topic-suggestions-container" class="hidden bg-green-50 border border-green-200 p-4 rounded-lg mb-6"></div>
            `;
            resultsPage.innerHTML += resultsHeader;

            if (postsToDisplay.length === 0) {
                resultsPage.innerHTML += `<p class="text-center text-gray-600">No blog posts found matching your search.</p>`;
            } else {
                const resultsList = document.createElement('div');
                postsToDisplay.forEach(post => {
                    const resultEl = document.createElement('div');
                    resultEl.className = 'mb-8';
                    resultEl.innerHTML = `
                        <div>
                            <span class="search-result-url">/blog/${post.id}</span>
                            <h3 class="text-xl mt-1"><a href="#" data-post-id="${post.id}" class="search-result-link font-medium">${post.title}</a></h3>
                        </div>
                        <p class="search-result-snippet mt-1">${post.snippet}</p>
                    `;
                    resultsList.appendChild(resultEl);
                });
                resultsPage.appendChild(resultsList);
            }
            resultsPage.classList.remove('hidden');

            // --- ADD EVENT LISTENERS FOR NEW ELEMENTS ---
            document.getElementById('home-logo-link').addEventListener('click', (e) => {
                e.preventDefault();
                resultsPage.classList.add('hidden');
                mainPage.classList.remove('hidden');
                searchInput.value = '';
            });
            document.getElementById('results-search-form').addEventListener('submit', handleSearch);
            document.querySelectorAll('.search-result-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    openPostModal(e.target.dataset.postId);
                });
            });
            const suggestBtn = document.getElementById('suggest-topics-button');
            if (suggestBtn) {
                suggestBtn.addEventListener('click', handleSuggestTopicsClick);
            }
        }

        function openPostModal(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                currentPostId = postId;
                modalContentBody.innerHTML = post.content;
                summaryContainer.classList.add('hidden'); // Hide summary on new post open
                summaryText.textContent = '';
                postModal.classList.remove('hidden');
            }
        }

        function closeModal() {
            postModal.classList.add('hidden');
            modalContentBody.innerHTML = '';
            currentPostId = null;
        }

        // --- EVENT HANDLERS ---
        function handleSearch(event) {
            event.preventDefault();
            const currentInput = document.getElementById('results-search-input') || searchInput;
            const query = currentInput.value.toLowerCase().trim();

            if (query === '') {
                const sortedPosts = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));
                displayResults(sortedPosts);
                return;
            }

            const filteredPosts = posts.filter(post =>
                post.title.toLowerCase().includes(query) ||
                post.tags.some(tag => tag.toLowerCase().includes(query))
            );
            displayResults(filteredPosts);
        }

        async function handleSummarizeClick(event) {
            const button = event.currentTarget;
            if (!currentPostId) return;

            const post = posts.find(p => p.id === currentPostId);
            if (!post) return;
            
            // Strip HTML for a cleaner prompt
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = post.content;
            const textContent = tempDiv.textContent || tempDiv.innerText || "";

            const prompt = `Provide a short, two-sentence summary of the following blog post content:\n\n---\n\n${textContent}`;
            
            setButtonLoading(button, true);
            summaryContainer.classList.add('hidden');

            const summary = await callGemini(prompt);
            
            summaryText.textContent = summary;
            summaryContainer.classList.remove('hidden');
            setButtonLoading(button, false);
        }

        async function handleSuggestTopicsClick(event) {
            const button = event.currentTarget;
            const query = document.getElementById('results-search-input').value;
            if (!query) return;

            const existingTitles = posts.map(p => p.title).join(', ');
            const prompt = `I have a blog with posts about these topics: ${existingTitles}. Based on the user's search for "${query}", suggest three creative and engaging blog post titles that are related but offer a fresh perspective. Return only a numbered list of the three titles.`;

            setButtonLoading(button, true);
            const suggestionsContainer = document.getElementById('topic-suggestions-container');
            suggestionsContainer.classList.add('hidden');

            const suggestions = await callGemini(prompt);

            suggestionsContainer.innerHTML = `<h3 class="font-bold text-lg text-green-800 mb-2">✨ AI-Suggested Topics</h3><div class="text-green-700 whitespace-pre-wrap">${suggestions}</div>`;
            suggestionsContainer.classList.remove('hidden');
            setButtonLoading(button, false);
        }

        // --- INITIAL EVENT LISTENERS ---
        searchForm.addEventListener('submit', handleSearch);

        luckyButton.addEventListener('click', () => {
            const latestPost = posts.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            if (latestPost) {
                openPostModal(latestPost.id);
            }
        });

        closeModalButton.addEventListener('click', closeModal);
        postModal.querySelector('.modal-backdrop').addEventListener('click', closeModal);
        summarizeButton.addEventListener('click', handleSummarizeClick);
        
        // Waffle Menu Logic
        waffleButton.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent click from closing menu immediately
            waffleMenu.classList.toggle('hidden');
        });

        // Close waffle menu if clicking outside
        window.addEventListener('click', (e) => {
            if (!waffleMenu.classList.contains('hidden') && !waffleMenu.contains(e.target) && !waffleButton.contains(e.target)) {
                waffleMenu.classList.add('hidden');
            }
        });


    </script>

</body>
</html>
